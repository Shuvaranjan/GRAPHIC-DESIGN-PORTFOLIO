<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        :root {
            --hue: 358;
            --first-color: hsl(var(--hue), 80%, 49%);
            --first-color-alt: hsl(var(--hue), 76%, 45%);
            --white-color: hsl(0, 0%, 98%);
            --black-color: hsl(0, 0%, 1%);
            --text-color: hsl(var(--hue), 2%, 66%);
            --body-color: hsl(var(--hue), 100%, 1%);
            --container-color: hsl(var(--hue), 2%, 10%);
            --conic-gradient: conic-gradient(from 150deg at 50% 45%,
                    hsl(var(--hue), 80%, 20%) 0deg,
                    hsl(var(--hue), 80%, 48%) 140deg,
                    hsl(var(--hue), 80%, 20%) 360deg);

        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100vw;
            height: 100vh;
        }

        .frame {
            width: 100%;
            height: 100%;
            overflow: hidden;

        }

        .frame .image {
            width: 100%;
            height: 100%;
            /* position: relative; */
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backdrop-filter: blur(5px);
            opacity: 0;
            transform: all .4s;
        }

        .loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 112px;
            height: 112px;
        }

        .box1,
        .box2,
        .box3 {
            /* border: 1px solid #ff0000; */
            background-color: rgba(51, 0, 255, 0.272);
            filter: drop-shadow(0 0 20px black);
            backdrop-filter: blur(87px);
            box-sizing: border-box;
            position: absolute;
            display: block;
        }

        .box1 {
            width: 112px;
            height: 48px;
            margin-top: 64px;
            margin-left: 0px;
            animation: abox1 2.5s 1s forwards linear infinite;
        }

        .box2 {
            width: 48px;
            height: 48px;
            margin-top: 0px;
            margin-left: 0px;
            animation: abox2 2.5s 1s forwards linear infinite;
        }

        .box3 {
            width: 48px;
            height: 48px;
            margin-top: 0px;
            margin-left: 64px;
            animation: abox3 2.5s 1s forwards linear infinite;
        }

        @keyframes abox1 {
            0% {
                width: 112px;
                height: 48px;
                margin-top: 64px;
                margin-left: 0px;
            }

            12.5% {

            75% {

            }

            }

            100% {
                width: 48px;

            }
        }

        @media (max-width: 956px) {
            .image {
                display: none;
            }

            .frame {
                width: 100%;
                height: 100%;
                overflow: hidden;
                background-image: url('./Assets/Images/mobile.png');
                background-position: center center;
                background-size: cover;
                background-repeat: no-repeat;
                transition: background-image .4s;
            }
